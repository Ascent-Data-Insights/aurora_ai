services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora
      POSTGRES_DB: aurora
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aurora:aurora@db:5432/aurora
      DEBUG: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_DEBUG: "true"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  pgdata:
